# domain 4대 분류 — canonical 이름 → 동의어/별칭 목록
# retriever.normalize_domain()이 입력 텍스트를 canonical 이름으로 변환
# meta.json domain 필드도 canonical로 통일 (scripts/normalize_domains.py)
#
# ┌─────────────┬──────────────────────────────────────────────────────────┐
# │ 인프라       │ HW 신규 구축, 데이터센터, DR 구축, 클라우드 인프라 구축     │
# │ ITO         │ HW/SW 운영·유지보수·유지관리 (상주 운영 포함)              │
# │ 응용시스템   │ 업무 애플리케이션 신규 구축·차세대·고도화 (금융·행정 등)    │
# │ 컨설팅       │ ISP·ISMP·BPR·EA 등 전략 수립·계획 수립                  │
# └─────────────┴──────────────────────────────────────────────────────────┘

