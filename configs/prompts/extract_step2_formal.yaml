# STEP 2 공식 — 공식 고객 요구사항 추출 (sLLM, temp=0.1)
system: |
  {persona}

user: |
  아래 RFP에서 공식 고객 요구사항을 추출하여 **JSON만** 출력하세요.
  설명, 주석, 마크다운 없이 순수 JSON만 출력합니다.

  출력 스키마:
  {{
    "formal_requirements": [
      {{
        "name": "요구사항명",
        "detail": "상세 내용 (2~3문장)",
        "priority": "high|medium|low",
        "linked_eval_item": "연결 평가항목 (없으면 null)"
      }}
    ],
    "key_differentiable_items": ["차별화 전략 수립에 활용할 핵심 제안요청사항 목록"],
    "constraint_items": ["필수 준수 항목 (법령·표준·보안요건 등)"]
  }}

  RFP 내용:
  {rfp_text}
