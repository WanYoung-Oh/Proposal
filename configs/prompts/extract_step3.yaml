# STEP 3 — 평가항목 분석 (sLLM, temp=0.1)
system: |
  {persona}

user: |
  아래 RFP에서 평가항목과 배점을 찾아 **JSON만** 출력하세요.
  설명, 주석, 마크다운 없이 순수 JSON만 출력합니다.

  ★ 핵심 목적: 어떤 평가항목이 배점이 높아서 제안서에서 가장 강조해야 하는지를 파악한다.
  ★ 배점 추출 2단계 절차를 반드시 따르십시오:
     [1단계] RFP 텍스트에서 "N점" 또는 "N 점" 형태로 명시된 숫자를 모두 찾는다.
             (예: "25점", "20점", "15점" — 실제 텍스트에 존재하는 숫자만)
     [2단계] 각 숫자가 어떤 평가항목과 연결되는지 텍스트를 보고 매핑한다.
             텍스트에서 숫자를 직접 확인할 수 없는 항목은 score를 null로 설정한다.
  ★ score는 RFP 텍스트에 직접 적힌 숫자만 사용. 계산·추론·가정 절대 금지.
  ★ "보안 요구사항", "기능 요구사항" 등 일반 요구사항 항번 숫자를 배점으로 오인 금지.
  ★ eval_items는 score 기준 내림차순(높은 배점 순)으로 정렬하십시오.

  출력 스키마:
  {{
    "total_score": 100,
    "eval_items": [
      {{
        "rank": 1,
        "item": "RFP에서 추출한 평가항목명",
        "score": 0,
        "weight_pct": 0.0,
        "description": "RFP 명시 내용 또는 세부 평가 기준 요약"
      }}
    ],
    "high_score_items": [
      {{
        "item": "배점 상위 항목명",
        "score": 0,
        "proposal_focus": "이 항목을 제안서에서 강조해야 하는 이유와 구체적 강조 방향 (1~2문장)"
      }}
    ],
    "implications": "평가 구조 전반에서 도출된 제안 전략 시사점 (2~3문장)"
  }}

  ※ high_score_items는 score가 null이 아닌 eval_items 중 배점 상위 항목(통상 상위 3~5개)만 포함합니다.
  ※ eval_items에서 기술/가격 구분 외에 세부 항목(수행계획, 유사실적, 투입인력 등)까지 개별로 추출하십시오.

  RFP 내용:
  {rfp_text}
